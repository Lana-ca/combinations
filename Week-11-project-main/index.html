<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Matcher - Find Your Perfect City</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <div class="content">
                <h1>Find Your Perfect City</h1>
                <p class="subtitle">Answer a few questions to discover cities that match your lifestyle and preferences</p>
                <button id="start-btn" class="btn btn-primary">Start Quiz</button>
                <button id="reset-btn" class="btn btn-secondary">Reset Progress</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="question-counter">
                Question <span id="current-question">1</span> of <span id="total-questions">12</span>
            </div>

            <div id="question-container" class="question-container">
                <h2 id="question-text"></h2>
                <div id="options-container" class="options-container"></div>
            </div>

            <div class="quiz-navigation">
                <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
                <button id="next-btn" class="btn btn-primary" disabled>Next</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="content">
                <h1>Your Perfect City Matches</h1>
                <p class="subtitle">Based on your preferences, here are your top city matches:</p>

                <div id="results-container" class="results-container"></div>

                <div class="results-actions">
                    <button id="retake-btn" class="btn btn-primary">Retake Quiz</button>
                    <button id="view-all-btn" class="btn btn-secondary">View All Matches</button>
                </div>
            </div>
        </div>

        <!-- All Matches Modal -->
        <div id="all-matches-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>All City Matches</h2>
                <div id="all-matches-container"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
